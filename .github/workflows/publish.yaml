name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yaml

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_COLOR: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing requires npm >= 11.5.1 (Node 22 ships npm 10.x).
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Normalize package.json
        working-directory: dist
        run: npm pkg fix

      # No NODE_AUTH_TOKEN: authentication is via OIDC (id-token: write),
      # which also generates provenance automatically.
      - name: Publish package
        working-directory: dist
        run: npm publish --access public
